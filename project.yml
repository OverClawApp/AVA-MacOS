name: AVA-MacOS
options:
  bundleIdPrefix: com.overclaw.ava
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  AVA-MacOS:
    type: application
    platform: macOS
    sources:
      - path: AVA-MacOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.overclaw.ava.desktop
        PRODUCT_NAME: AVA Desktop
        INFOPLIST_FILE: AVA-MacOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: AVA-MacOS/AVA_MacOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
